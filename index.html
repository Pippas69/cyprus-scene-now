    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts async (avoid render-blocking white screen before splash) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cinzel+Decorative:wght@700&display=swap" onload="this.onload=null;this.rel='stylesheet'">

    <!-- Inline splash screen - shows INSTANTLY before any JS loads -->
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #091E30;
      }
      #root {
        min-height: 100vh;
        background: #091E30;
      }
      #inline-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0C4A6E 0%, #155E75 30%, #0E7490 60%, #0891B2 100%);
        transition: opacity 0.4s ease-out;
      }
      #inline-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #inline-splash h1 {
        font-family: 'Cinzel Decorative', serif;
        font-size: clamp(3rem, 8vw, 5rem);
        font-weight: 700;
        color: #FEFAF6;
        letter-spacing: 0.1em;
        margin: 0;
        animation: splash-in 0.5s ease-out;
      }
      #inline-splash p {
        color: rgba(254, 250, 246, 0.8);
        font-size: 0.875rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 0.5rem;
        animation: splash-in 0.5s ease-out 0.2s both;
      }
      .splash-dots {
        position: absolute;
        bottom: 5rem;
        display: flex;
        gap: 0.5rem;
      }
      .splash-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: rgba(254, 250, 246, 0.6);
        animation: splash-pulse 1s infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splash-in {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.5); opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- Splash start marker -->
    <script>
      window.__fomoSplashStart = performance.now();
    </script>

    <!-- Inline splash visible immediately -->
    <div id="inline-splash">
      <h1>ΦΟΜΟ</h1>
      <p>Cyprus</p>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
