<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΦΟΜΟ — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0C4A6E 0%, #155E75 30%, #0E7490 60%, #0891B2 100%);
      color: #FEFAF6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 3rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    p {
      font-size: 1.125rem;
      opacity: 0.85;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #FEFAF6;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.25); }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>ΦΟΜΟ</h1>
  <p>Δεν υπάρχει σύνδεση στο internet. Ελέγξτε τη σύνδεσή σας και δοκιμάστε ξανά.</p>
  <button onclick="window.location.reload()">Δοκιμάστε ξανά</button>
</body>
</html>
